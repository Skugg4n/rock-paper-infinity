<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Infinity - Civilization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style-stage2.css">
</head>
<body id="game-body">
    <button id="debug-toggle-btn" class="absolute top-0 left-0 w-16 h-16 z-40 opacity-0"></button>

    <!-- UI -->
    <div class="absolute top-8 left-4 md:left-8 flex flex-col gap-2 z-20">
        <div class="flex items-center gap-4">
            <i data-lucide="star" class="w-10 h-10 text-amber-400"></i>
            <div>
                <span id="star-count" class="font-mono font-bold text-3xl text-slate-600"></span>
                <span id="net-star-change" class="block font-mono text-lg text-slate-500">+0/s</span>
                <span id="stars-per-person" class="block font-mono text-xs text-slate-500">0 per person</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <i data-lucide="atom" class="w-10 h-10 text-sky-500"></i>
            <div>
                <span id="science-count" class="font-mono font-bold text-3xl text-slate-600"></span>
                <span id="net-science-change" class="block font-mono text-lg text-slate-500">+0/s</span>
            </div>
        </div>
        <div id="allocation-slider-container" class="pt-2">
            <div class="flex justify-between text-xs text-slate-500">
                <span class="flex items-center gap-1"><i data-lucide="star" class="w-3 h-3"></i> Industry</span>
                <span class="flex items-center gap-1">Research <i data-lucide="atom" class="w-3 h-3"></i></span>
            </div>
            <input type="range" min="0" max="100" value="50" class="w-full" id="allocation-slider">
        </div>
    </div>
    
    <!-- DEBUG MENU -->
      <div id="debug-menu">
          <h3>Debug Menu</h3>
          <button class="debug-btn" onclick="debug_addResources('stars', 10000000)">+10M Stars</button>
          <button class="debug-btn" onclick="debug_addResources('science', 100000)">+100k Science</button>
          <hr class="border-slate-500 my-2">
          <button class="debug-btn" onclick="debug_addPopulation(1000)">+1k Population</button>
          <hr class="border-slate-500 my-2">
          <button class="debug-btn" onclick="window.location.href='index.html'">Back to Stage 1</button>
      </div>

    <div class="absolute top-8 right-4 md:right-8 flex flex-col items-end gap-6 z-20">
        <div id="population-ui" class="info-ui flex items-center gap-3">
             <span id="population-count-total" class="font-mono font-bold text-2xl text-slate-600">0</span>
             <i data-lucide="users" class="w-6 h-6 text-slate-500"></i>
        </div>
        <div id="supplies-ui" class="info-ui flex items-center gap-2">
            <div class="flex flex-col items-end gap-1">
                <div class="supplies-track">
                    <div class="center-marker"></div>
                    <div id="supplies-bar" class="balance-fill transition-all duration-200"></div>
                </div>
                <div class="flex justify-between w-full gap-2 text-[11px]">
                    <span id="supply-consumption" class="font-mono text-red-600">-0/s</span>
                    <span id="supply-delta" class="font-mono text-slate-600 text-right">Balanced</span>
                    <span id="supply-production" class="font-mono text-green-600">+0/s</span>
                </div>
            </div>
            <i data-lucide="shopping-basket" class="w-6 h-6 text-green-500"></i>
        </div>
    </div>
    
    <!-- LAND -->
    <div class="w-full h-full flex items-center justify-center p-4">
        <div id="land-grid" class="grid grid-cols-5 gap-4"></div>
    </div>

    <!-- BUILD MENU -->
    <div class="absolute bottom-8 right-8 flex flex-col items-end gap-3 z-20">
        <div id="upgrades-container" class="flex flex-col items-end gap-3">
             <button class="btn hidden" id="megastructure-research-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                <div class="tooltip"></div>
            </button>
             <button class="btn hidden" id="computer-upgrade-btn">
                <i data-lucide="computer" class="w-7 h-7"></i>
                <div class="tooltip"></div>
            </button>
            <button class="btn hidden" id="car-upgrade-btn">
                <i data-lucide="car" class="w-7 h-7"></i>
                <div class="tooltip"></div>
            </button>
             <button class="btn hidden" id="urbanism-research-btn">
                <i data-lucide="building-2" class="w-7 h-7"></i>
                <div class="tooltip"></div>
            </button>
            <button class="btn hidden" id="tool-case-upgrade-btn">
                <i data-lucide="tool-case" class="w-7 h-7"></i>
                <div class="tooltip"></div>
            </button>
            <button class="btn hidden" id="expand-land-btn">
                <i data-lucide="land-plot" class="w-7 h-7"></i>
                <div class="tooltip"></div>
            </button>
            <button class="btn hidden" id="gmo-upgrade-btn">
                 <svg class="progress-ring w-full h-full" viewBox="0 0 40 40"><circle class="progress-ring-base" cx="20" cy="20" r="18" fill="none" stroke-width="2"></circle><circle id="gmo-ring" class="progress-ring-fg" cx="20" cy="20" r="18" fill="none" stroke-width="4" stroke-dasharray="113" stroke-dashoffset="113" style="stroke: #81e6d9;"></circle></svg>
                <i data-lucide="flask-conical" class="w-7 h-7 absolute"></i>
                <div class="tooltip"></div>
            </button>
        </div>
        <div id="build-separator" class="w-full h-px bg-slate-300 my-1 hidden"></div>
        <div id="buildings-container" class="flex flex-col items-end gap-3">
            <button class="btn" id="build-store-btn">
                <i data-lucide="store" class="w-7 h-7"></i>
                <div class="tooltip"></div>
            </button>
            <button class="btn" id="build-home-btn">
                <i data-lucide="home" class="w-7 h-7"></i>
                <div class="tooltip"></div>
            </button>
        </div>
    </div>

      <div id="version-info" class="absolute bottom-2 left-2 text-[10px] text-slate-400 select-none">v1.3.14</div>
      <!-- Menu button -->
      <div id="menu-wrapper" class="fixed bottom-4 left-4">
          <div class="relative">
              <button id="menu-btn" class="btn w-12 h-12 rounded-full bg-white shadow-lg transition-transform hover:scale-110">
                  <i data-lucide="menu" class="w-6 h-6 text-slate-600"></i>
              </button>
              <div id="menu-dropdown" class="hidden absolute bottom-14 left-0 bg-white rounded-lg shadow-lg">
                  <button id="reset-btn" class="block px-4 py-2 text-sm hover:bg-slate-100 whitespace-nowrap">Reset everything</button>
              </div>
          </div>
      </div>
    <script type="module">
      import { init } from './src/phase2/index.js';
      import { VERSION } from './src/version.js';

      init();
      document.getElementById('version-info').textContent = VERSION;
    </script>
</body>
</html>
