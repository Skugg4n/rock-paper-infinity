# Rock, Paper, Infinity — Backlog
#
# This file is the AUTHORITATIVE LIST of pending user requests and feature
# work. It exists because items get missed when scattered across
# PROJECTPLAN.md, CHANGELOG.md, PDF feedback, and chat history.
#
# === RULES — must be respected without exception ===
#
# 1. Every user request gets a new item here with a fresh ID (B-prefix +
#    next number).
#
# 2. Status `open` = not yet shipped. Status `done` = verified shipped
#    AND `resolved_in` filled with the version that closed it.
#
# 3. NEVER mark `done` without a corresponding commit and version. Only
#    mark `done` after you have actually shipped the change.
#
# 4. NEVER remove `open` items without explicit user permission.
#
# 5. When the user adds a new request, append it to the end of `items:`
#    with the next sequential B-id, today's `added` date, and a clear
#    `source` (PDF name, screenshot timestamp, or "chat 2026-04-27").
#
# 6. When closing an item, set `status: done`, fill `resolved_in: vX.Y.Z`,
#    and leave the item in the file as a record. Do NOT delete it.
#
# Format — each item is a YAML mapping with required fields:
#   id        - string, unique (e.g. "B001")
#   added     - YYYY-MM-DD when the user first requested it
#   source    - where it came from (PDF, screenshot, chat date)
#   request   - the user's request, in their own words when possible
#   status    - "open" or "done"
#   resolved_in - version that closed it, or null if open
#   notes     - optional, any context about deferral or design dependencies

