<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Infinity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style id="dynamic-styles"></style> <!-- For dynamic animation timings -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-stage2.css">
</head>
<body class="text-slate-800">

    <!-- ==================== PHASE 1: INDUSTRY ==================== -->
    <div id="phase-industry" class="phase-container hidden">

        <!-- Star display on the left -->
        <div class="absolute top-4 left-3 sm:top-8 sm:left-4 md:left-8 max-w-[60vw] sm:max-w-none">
            <div id="win-tracker" aria-label="Stars" aria-live="polite" class="flex flex-col items-start gap-2 sm:gap-3"></div>
        </div>

        <!-- Right-side panel: counters + resource bars -->
        <div class="absolute top-4 right-3 sm:top-8 sm:right-4 md:right-8 flex flex-col items-end gap-2 sm:gap-3">
            <!-- Game counters (shown after first game) -->
            <div id="game-counters" class="hidden flex flex-col items-end gap-0.5 text-slate-400">
                <div class="flex items-center gap-1">
                    <span id="games-value" aria-label="Games played" aria-live="polite" class="font-mono text-xs sm:text-sm tabular-nums">0</span>
                    <span id="games-icon"></span>
                </div>
                <div class="flex items-center gap-1">
                    <span id="wins-value" aria-label="Wins" aria-live="polite" class="font-mono text-xs sm:text-sm tabular-nums">0</span>
                    <span id="wins-icon"></span>
                </div>
            </div>
            <!-- Resource bars (shown after 10 stars) -->
            <div id="resource-bars" class="hidden flex flex-col items-end gap-3 sm:gap-4">
                <div class="flex items-end gap-2">
                <div id="energy-container" aria-label="Energy" role="progressbar" class="w-3 h-24 sm:w-4 sm:h-32 bg-slate-300 rounded-full overflow-hidden p-0.5 sm:p-1 flex flex-col justify-end">
                    <div id="energy-fill" class="w-full bg-slate-500 rounded-full transition-all duration-300"></div>
                </div>
                <div id="reserve-energy-container" aria-label="Reserve energy" role="progressbar" class="w-4 h-28 sm:w-6 sm:h-40 bg-slate-300 rounded-full overflow-hidden p-0.5 sm:p-1 flex flex-col justify-end">
                    <div id="reserve-energy-fill" class="w-full bg-slate-400 rounded-full transition-all duration-300"></div>
                </div>
            </div>
            <div id="quantum-foam-container" class="hidden w-16 flex flex-col items-center gap-2">
                <button id="collapse-foam-btn" class="btn w-12 h-12 rounded-full flex justify-center items-center overflow-hidden" disabled>
                    <div id="collapse-foam-fill" style="height: 0%;"></div>
                    <i data-lucide="zap" class="relative w-6 h-6 text-slate-600"></i>
                </button>
            </div>
            <div id="sps-container" class="hidden flex items-center gap-1 sm:gap-2 text-slate-500">
                <span id="sps-value" class="font-bold text-sm sm:text-lg font-mono">0.0</span>
                <div class="flex items-center">
                    <i data-lucide="star" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                    <span class="font-bold text-xs sm:text-sm mx-0.5">/</span>
                    <i data-lucide="timer" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                </div>
            </div>
            <div id="eps-container" class="hidden flex items-center gap-1 sm:gap-2 text-slate-500">
                <span id="eps-value" class="font-bold text-sm sm:text-lg font-mono">0.0</span>
                <div class="flex items-center">
                    <i data-lucide="zap-off" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                    <span class="font-bold text-xs sm:text-sm mx-0.5">/</span>
                    <i data-lucide="timer" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                </div>
            </div>
             <div id="egps-container" class="hidden flex items-center gap-1 sm:gap-2 text-slate-500">
                <span id="egps-value" class="font-bold text-sm sm:text-lg font-mono">0.0</span>
                <div class="flex items-center">
                    <i data-lucide="atom" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                    <span class="font-bold text-xs sm:text-sm mx-0.5">/</span>
                    <i data-lucide="timer" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                </div>
            </div>
        </div>
        </div>

        <!-- Main container for the game -->
        <div class="w-full max-w-2xl mx-auto p-4 flex flex-col h-[100svh]">
            <header class="h-12 sm:h-16 flex-shrink-0"></header> <!-- Spacer -->

            <main id="game-board-container" class="pointer-events-none flex-grow grid grid-cols-1 items-center justify-center gap-4">
                <!-- Game boards are injected here by JS -->
            </main>

            <footer id="player-zone" class="h-40 flex-shrink-0 flex flex-col justify-end items-center gap-4 pb-4">
                <div id="player-controls-container" class="flex justify-center items-center gap-1.5 sm:gap-2 w-full max-w-sm">
                    <button data-choice="rock" aria-label="Rock" class="btn choice-btn bg-slate-50 w-12 h-12 sm:w-16 sm:h-16 rounded-full shadow-md flex justify-center items-center"><i data-lucide="gem"></i></button>
                    <button data-choice="paper" aria-label="Paper" class="btn choice-btn bg-slate-50 w-12 h-12 sm:w-16 sm:h-16 rounded-full shadow-md flex justify-center items-center"><i data-lucide="file-text"></i></button>
                    <button data-choice="scissors" aria-label="Scissors" class="btn choice-btn bg-slate-50 w-12 h-12 sm:w-16 sm:h-16 rounded-full shadow-md flex justify-center items-center"><i data-lucide="scissors"></i></button>
                    <button id="manualRecharge" aria-label="Manual recharge" data-upgrade="manualRecharge" class="invisible btn upgrade-btn bg-slate-50 w-12 h-12 sm:w-16 sm:h-16 rounded-full shadow-md flex justify-center items-center"><i data-lucide="battery-charging"></i></button>
                    <button id="autoPlay" aria-label="Auto-play" data-upgrade="autoPlay" class="invisible btn upgrade-btn bg-slate-50 w-12 h-12 sm:w-16 sm:h-16 rounded-full shadow-md flex justify-center items-center"><i data-lucide="repeat-2"></i></button>
                </div>
            </footer>
        </div>

        <!-- Upgrade buttons -->
        <div class="absolute bottom-4 right-3 sm:bottom-8 sm:right-8 flex items-end gap-2 sm:gap-3">
            <div id="downgrade-tray" class="flex flex-col gap-3"></div>
            <div id="upgrade-tray" class="flex flex-col gap-3">
                <button id="speed" aria-label="Upgrade game speed" data-upgrade="speed" class="invisible btn upgrade-btn bg-white p-3 rounded-full shadow-lg">
                    <svg class="absolute inset-0 w-full h-full" viewBox="0 0 36 36">
                        <circle class="progress-ring-bg" cx="18" cy="18" r="16" fill="none" stroke-width="3"></circle>
                        <circle id="speed-progress" class="progress-ring-fg" cx="18" cy="18" r="16" fill="none" stroke-width="3" stroke-dasharray="100.5" stroke-dashoffset="100.5"></circle>
                    </svg>
                    <i id="speed-icon" data-lucide="chevrons-right" class="relative w-6 h-6 text-slate-600"></i>
                </button>
                <button id="energyGenerator" aria-label="Upgrade energy generator" data-upgrade="energyGenerator" class="invisible btn upgrade-btn bg-white p-3 rounded-full shadow-lg">
                    <svg class="absolute inset-0 w-full h-full" viewBox="0 0 36 36">
                        <circle class="progress-ring-bg" cx="18" cy="18" r="16" fill="none" stroke-width="3"></circle>
                        <circle id="energy-gen-progress" class="progress-ring-fg" cx="18" cy="18" r="16" fill="none" stroke-width="3" stroke-dasharray="100.5" stroke-dashoffset="100.5"></circle>
                    </svg>
                    <i data-lucide="atom" class="relative w-6 h-6 text-slate-600"></i>
                </button>
                <button id="buyBattery" aria-label="Buy battery reserve" data-upgrade="buyBattery" class="invisible btn upgrade-btn bg-white p-3 rounded-full shadow-lg"><i data-lucide="battery-plus" class="relative w-6 h-6 text-slate-600"></i></button>
                <button id="luck" aria-label="Luck upgrade" data-upgrade="luck" class="invisible btn upgrade-btn bg-white p-3 rounded-full shadow-lg"><i data-lucide="clover" class="relative w-6 h-6 text-slate-600"></i></button>
                <button id="addGameBoard" aria-label="Add game board" data-upgrade="addGameBoard" class="invisible btn upgrade-btn bg-white p-3 rounded-full shadow-lg">
                    <svg class="absolute inset-0 w-full h-full" viewBox="0 0 36 36">
                        <circle class="progress-ring-bg" cx="18" cy="18" r="16" fill="none" stroke-width="3"></circle>
                        <circle id="add-board-progress" class="progress-ring-fg" cx="18" cy="18" r="16" fill="none" stroke-width="3" stroke-dasharray="100.5" stroke-dashoffset="100.5"></circle>
                    </svg>
                    <i data-lucide="copy" class="relative w-6 h-6 text-slate-600"></i>
                </button>
                <button id="mergeGameBoard" aria-label="Build factory" data-upgrade="mergeGameBoard" class="invisible btn upgrade-btn bg-white p-3 rounded-full shadow-lg"><i data-lucide="factory" class="relative w-6 h-6 text-slate-600"></i></button>
                <button id="bank" aria-label="Build bank — advance to next phase" data-upgrade="bank" class="invisible btn upgrade-btn bg-white p-3 rounded-full shadow-lg"><i data-lucide="landmark" class="relative w-6 h-6 text-slate-600"></i></button>
            </div>
        </div>

        <!-- Phase 1 Debug menu -->
        <div id="debug-trigger" class="absolute top-0 left-0 w-16 h-16 cursor-pointer"></div>
        <div id="debug-menu" class="hidden absolute top-16 left-4 flex flex-col gap-2 bg-slate-700 p-2 rounded-lg shadow-xl z-20">
            <div class="text-white text-xs font-bold border-b border-slate-600 pb-1 mb-1">Stars</div>
            <button data-add-stars="1" class="text-white text-xs font-bold bg-slate-600 hover:bg-slate-500 rounded px-2 py-1">+1 ★</button>
            <button data-add-stars="100" class="text-white text-xs font-bold bg-slate-600 hover:bg-slate-500 rounded px-2 py-1">+100 ★</button>
            <button data-add-stars="1000" class="text-white text-xs font-bold bg-slate-600 hover:bg-slate-500 rounded px-2 py-1">+1k ★</button>
            <button data-add-stars="10000" class="text-white text-xs font-bold bg-slate-600 hover:bg-slate-500 rounded px-2 py-1">+10k ★</button>
            <div class="text-white text-xs font-bold border-b border-slate-600 pb-1 my-1">Speed</div>
            <div class="flex items-center justify-between gap-2">
                 <button data-change-speed="-1" class="text-white text-lg font-bold bg-slate-600 hover:bg-slate-500 rounded w-6 h-6">-</button>
                 <span id="debug-speed" class="text-white text-xs font-mono">⚡︎ 1x</span>
                 <button data-change-speed="1" class="text-white text-lg font-bold bg-slate-600 hover:bg-slate-500 rounded w-6 h-6">+</button>
            </div>
            <div class="text-white text-xs font-bold border-b border-slate-600 pb-1 my-1">Games</div>
            <div id="debug-games-played" class="text-white text-xs font-mono text-center">0</div>
            <button class="text-white text-xs font-bold bg-slate-600 hover:bg-slate-500 rounded px-2 py-1" onclick="setPhase(phases.CITY)">Go to Stage 2</button>
        </div>

    </div>

    <!-- ==================== PHASE 2: CITY ==================== -->
    <div id="phase-city" class="phase-container hidden">

        <button id="debug-toggle-btn" class="absolute top-0 left-0 w-16 h-16 z-40 opacity-0"></button>

        <!-- UI -->
        <div class="absolute top-4 left-3 sm:top-8 sm:left-4 md:left-8 flex flex-col gap-1.5 sm:gap-2 z-20">
            <div class="flex items-center gap-2 sm:gap-4">
                <i data-lucide="star" class="w-5 h-5 sm:w-7 sm:h-7 text-slate-400" aria-hidden="true"></i>
                <div>
                    <span id="star-count" aria-label="Stars" aria-live="polite" class="font-mono font-bold text-xl sm:text-3xl text-slate-600"></span>
                    <span id="net-star-change" class="block font-mono text-sm sm:text-lg text-slate-500">+0/s</span>
                    <span id="stars-per-person" class="p2-disclose block font-mono text-[10px] sm:text-xs text-slate-500">0 per person</span>
                </div>
            </div>
            <div id="science-row" class="p2-disclose flex items-center gap-2 sm:gap-4">
                <i data-lucide="atom" class="w-5 h-5 sm:w-7 sm:h-7 text-slate-400" aria-hidden="true"></i>
                <div>
                    <span id="science-count" aria-label="Science" aria-live="polite" class="font-mono font-bold text-xl sm:text-3xl text-slate-600"></span>
                    <span id="net-science-change" class="block font-mono text-sm sm:text-lg text-slate-500">+0/s</span>
                </div>
            </div>
            <div id="allocation-slider-container" class="p2-disclose pt-2">
                <div class="flex justify-between text-xs text-slate-500">
                    <span class="flex items-center gap-1"><i data-lucide="star" class="w-3 h-3"></i> Industry</span>
                    <span class="flex items-center gap-1">Research <i data-lucide="atom" class="w-3 h-3"></i></span>
                </div>
                <div class="flex items-center gap-1">
                    <button id="allocation-dec-btn" class="allocation-step-btn sm:hidden" aria-label="Decrease research allocation by 5%">−</button>
                    <input type="range" min="0" max="100" value="50" class="w-full" id="allocation-slider" aria-label="Population allocation: Industry vs Research">
                    <button id="allocation-inc-btn" class="allocation-step-btn sm:hidden" aria-label="Increase research allocation by 5%">+</button>
                </div>
            </div>
        </div>

        <!-- Phase 2 DEBUG MENU -->
        <div id="p2-debug-menu">
            <h3>Debug Menu</h3>
            <button class="debug-btn" onclick="debug_addResources('stars', 10000000)">+10M Stars</button>
            <button class="debug-btn" onclick="debug_addResources('science', 100000)">+100k Science</button>
            <hr class="border-slate-500 my-2">
            <button class="debug-btn" onclick="debug_addPopulation(1000)">+1k Population</button>
            <hr class="border-slate-500 my-2">
            <button class="debug-btn" onclick="setPhase(phases.INDUSTRY)">Back to Stage 1</button>
        </div>

        <div class="absolute top-4 right-3 sm:top-8 sm:right-4 md:right-8 flex flex-col items-end gap-3 sm:gap-6 z-20">
            <div id="population-ui" class="info-ui flex items-center gap-2 sm:gap-3">
                 <span id="population-count-total" class="font-mono font-bold text-lg sm:text-2xl text-slate-600">0</span>
                 <i data-lucide="users" class="w-5 h-5 sm:w-6 sm:h-6 text-slate-500"></i>
            </div>
            <div id="supplies-ui" class="info-ui flex items-center gap-1.5 sm:gap-2">
                <div class="flex flex-col items-end gap-1">
                    <div class="supplies-track">
                        <div class="center-marker"></div>
                        <div id="supplies-bar" class="balance-fill transition-all duration-200"></div>
                    </div>
                    <div class="flex justify-between w-full gap-2 text-[12px]">
                        <span id="supply-consumption" class="font-mono text-slate-500">-0/s</span>
                        <span id="supply-delta" class="font-mono text-slate-600 text-right">Balanced</span>
                        <span id="supply-production" class="font-mono text-slate-500">+0/s</span>
                    </div>
                </div>
                <i data-lucide="shopping-basket" class="w-5 h-5 text-slate-400"></i>
            </div>
        </div>

        <!-- LAND -->
        <div class="w-full h-full flex flex-col items-center justify-center p-4">
            <div id="land-grid" class="grid grid-cols-5 gap-1 sm:gap-4"></div>
            <div id="competitor-island" class="hidden mt-8 flex justify-center">
                <div class="enemy-factory relative w-24 h-24 rounded-xl flex items-center justify-center">
                    <i data-lucide="factory" class="w-12 h-12 text-slate-500"></i>
                </div>
            </div>
        </div>

        <!-- BUILD MENU -->
        <div class="absolute bottom-4 right-3 sm:bottom-8 sm:right-8 flex flex-col items-end gap-2 sm:gap-3 z-20">
            <div id="upgrades-container" class="flex flex-col items-end gap-3">
                 <button class="btn hidden" id="megastructure-research-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    <div class="tooltip"></div>
                </button>
                 <button class="btn hidden" id="computer-upgrade-btn">
                    <i data-lucide="computer" class="w-7 h-7"></i>
                    <div class="tooltip"></div>
                </button>
                <button class="btn hidden" id="car-upgrade-btn">
                    <i data-lucide="car" class="w-7 h-7"></i>
                    <div class="tooltip"></div>
                </button>
                 <button class="btn hidden" id="urbanism-research-btn">
                    <i data-lucide="building-2" class="w-7 h-7"></i>
                    <div class="tooltip"></div>
                </button>
                <button class="btn hidden" id="tool-case-upgrade-btn">
                    <i data-lucide="tool-case" class="w-7 h-7"></i>
                    <div class="tooltip"></div>
                </button>
                <button class="btn hidden" id="expand-land-2-btn">
                    <i data-lucide="land-plot" class="w-7 h-7"></i>
                    <div class="tooltip"></div>
                </button>
                <button class="btn hidden" id="expand-land-btn">
                    <i data-lucide="land-plot" class="w-7 h-7"></i>
                    <div class="tooltip"></div>
                </button>
                <button class="btn hidden" id="superconductor-btn">
                     <svg class="progress-ring w-full h-full" viewBox="0 0 40 40"><circle class="progress-ring-base" cx="20" cy="20" r="18" fill="none" stroke-width="2"></circle><circle id="superconductor-ring" class="progress-ring-fg" cx="20" cy="20" r="18" fill="none" stroke-width="4" stroke-dasharray="113" stroke-dashoffset="113" style="stroke: #64748b;"></circle></svg>
                    <i data-lucide="cpu" class="w-7 h-7 absolute"></i>
                    <div class="tooltip"></div>
                </button>
                <button class="btn hidden" id="gmo-upgrade-btn">
                     <svg class="progress-ring w-full h-full" viewBox="0 0 40 40"><circle class="progress-ring-base" cx="20" cy="20" r="18" fill="none" stroke-width="2"></circle><circle id="gmo-ring" class="progress-ring-fg" cx="20" cy="20" r="18" fill="none" stroke-width="4" stroke-dasharray="113" stroke-dashoffset="113" style="stroke: #94a3b8;"></circle></svg>
                    <i data-lucide="flask-conical" class="w-7 h-7 absolute"></i>
                    <div class="tooltip"></div>
                </button>
            </div>
            <div id="build-separator" class="w-full h-px bg-slate-300 my-1 hidden"></div>
            <div id="buildings-container" class="flex flex-col items-end gap-3">
                <button class="btn" id="build-store-btn">
                    <i data-lucide="store" class="w-7 h-7"></i>
                    <div class="tooltip"></div>
                </button>
                <button class="btn" id="build-home-btn">
                    <i data-lucide="home" class="w-7 h-7"></i>
                    <div class="tooltip"></div>
                </button>
            </div>
        </div>

    </div>

    <!-- ==================== SHARED ELEMENTS ==================== -->
    <div id="menu-wrapper" class="fixed bottom-4 left-4">
        <div class="relative">
            <button id="menu-btn" class="btn w-12 h-12 rounded-full bg-white shadow-lg transition-transform hover:scale-110">
                <i data-lucide="menu" class="w-6 h-6 text-slate-600"></i>
            </button>
            <div id="menu-dropdown" class="hidden absolute bottom-14 left-0 bg-white rounded-lg shadow-lg">
                <button id="reset-btn" class="block px-4 py-2 text-sm hover:bg-slate-100 whitespace-nowrap">Reset everything</button>
            </div>
        </div>
    </div>

    <div id="version-info" class="fixed bottom-2 left-2 text-[10px] text-slate-400 select-none">v1.18.2</div>
    <div id="tooltip"></div>

    <div id="chapter-card" class="chapter-card" aria-hidden="true">
      <div class="chapter-card__veil"></div>
      <div class="chapter-card__content">
        <div class="chapter-card__roman"></div>
        <div class="chapter-card__title"></div>
        <div class="chapter-card__suffix" hidden>to come</div>
      </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
